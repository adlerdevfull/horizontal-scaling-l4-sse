# NGINX Layer 4 Load Balancer Configuration
# L4 operates at TCP level - no HTTP inspection, just forwards connections
# This is essential for SSE: L7 would buffer/timeout long connections

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
}

# ============================================
# LAYER 4 - TCP STREAM (main LB)
# ============================================
stream {
    log_format tcp_log '$remote_addr [$time_local] $protocol '
                       '$status $bytes_sent $bytes_received '
                       '$session_time "$upstream_addr"';

    access_log /var/log/nginx/tcp_access.log tcp_log;

    # Upstream: 3 app instances with health checks
    upstream app_backend {
        least_conn;  # Best for long-lived connections (SSE)

        server app1:80 max_fails=3 fail_timeout=30s;
        server app2:80 max_fails=3 fail_timeout=30s;
        server app3:80 max_fails=3 fail_timeout=30s;
    }

    # SSE dedicated upstream (sticky by IP for reconnection)
    upstream sse_backend {
        hash $remote_addr consistent;  # Same client → same server

        server app1:80 max_fails=3 fail_timeout=30s;
        server app2:80 max_fails=3 fail_timeout=30s;
        server app3:80 max_fails=3 fail_timeout=30s;
    }

    # Main HTTP traffic - port 80
    server {
        listen 80;
        proxy_pass app_backend;
        proxy_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # SSE traffic - port 8001 (long-lived connections)
    server {
        listen 8001;
        proxy_pass sse_backend;
        proxy_timeout 3600s;      # 1 hour for SSE
        proxy_connect_timeout 5s;
    }
}
